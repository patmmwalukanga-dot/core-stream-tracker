<script type="text/babel">
    // Fixed UI Style Engine - String Safe
    const globalStyles = `
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700;800&display=swap');
      
      :root {
        --bg-main: #030712;
        --bg-panel: #090f1e;
        --accent: #00ffcc;
        --accent-dim: rgba(0, 255, 204, 0.15);
        --text-muted: #94a3b8;
        --text-dark: #4b5563;
        --border-glow: rgba(0, 255, 204, 0.2);
      }

      body { 
        margin: 0; 
        background: #030712; 
        color: #00ffcc; 
        font-family: 'JetBrains Mono', monospace;
      }

      .landing-wrapper {
        font-family: 'Space Grotesk', sans-serif;
        color: #fff;
        min-height: 100vh;
        background: #030712;
      }
      .landing-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 8%;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .brand-logo {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 800;
        color: #00ffcc;
        letter-spacing: 1px;
      }
      .hero-section {
        text-align: center;
        padding: 100px 20px 60px 20px;
        max-width: 900px;
        margin: 0 auto;
      }
      .hero-tag {
        font-family: 'JetBrains Mono', monospace;
        color: #00ffcc;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 16px;
      }
      .hero-title {
        font-size: 56px;
        font-weight: 700;
        line-height: 1.1;
        margin: 0 0 24px 0;
        color: #ffffff;
      }
      .hero-desc {
        color: #94a3b8;
        font-size: 18px;
        max-width: 600px;
        margin: 0 auto 40px auto;
      }
      .landing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        padding: 40px 8%;
        max-width: 1200px;
        margin: 0 auto;
      }
      .feature-card {
        background: #090f1e;
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        padding: 32px;
      }
      .feature-icon {
        color: #00ffcc;
        font-size: 24px;
        margin-bottom: 16px;
      }
      .feature-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 12px 0;
      }
      .feature-desc {
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.5;
      }

      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-card {
        background: #090f1e;
        border: 1px solid rgba(0, 255, 204, 0.15);
        border-radius: 12px;
        width: 100%;
        max-width: 420px;
        padding: 40px;
      }

      .hud-btn { 
        background: rgba(0, 255, 204, 0.15); 
        border: 1px solid rgba(0, 255, 204, 0.2); 
        color: #00ffcc; 
        padding: 10px 20px; 
        font-size: 12px; 
        font-weight: 700; 
        cursor: pointer; 
        border-radius: 6px; 
        font-family: 'JetBrains Mono', monospace; 
      }
      .hud-btn:hover { background: #00ffcc; color: #030712; }
      .btn-primary { background: #00ffcc; color: #030712; border: none; font-weight: 800; }
      .btn-text { background: transparent; border: none; color: #94a3b8; cursor: pointer; text-decoration: underline; }
      
      .hud-input { 
        width: 100%; 
        padding: 12px; 
        background: #030712; 
        border: 1px solid rgba(0, 255, 204, 0.2); 
        border-radius: 6px; 
        color: #fff; 
        box-sizing: border-box; 
        margin-top: 6px; 
      }

      .dashboard-container { display: flex; min-height: 100vh; }
      .nav-drawer {
        width: 260px;
        background: #090f1e;
        border-right: 1px solid rgba(0, 255, 204, 0.2);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px 16px;
      }
      .drawer-menu { display: flex; flex-direction: column; gap: 8px; margin-top: 40px; }
      .drawer-item {
        padding: 12px 16px;
        border-radius: 6px;
        cursor: pointer;
        color: #94a3b8;
        font-size: 13px;
      }
      .drawer-item.active, .drawer-item:hover {
        background: rgba(0, 255, 204, 0.05);
        color: #00ffcc;
      }
      .main-content { flex-grow: 1; padding: 32px; box-sizing: border-box; }
      
      .progress-bar-container { background: rgba(255,255,255,0.05); border-radius: 4px; height: 6px; width: 100%; margin-top: 8px; }
      .progress-bar-fill { background: #00ffcc; height: 100%; }

      .alert-banner { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #f87171; padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 16px; }
      .hud-header { display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0, 255, 204, 0.2); background: #0f172a; padding: 16px 24px; border-radius: 8px; margin-bottom: 24px; }
      .dashboard-grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; }
      .panel-box { background: #090f1e; border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 8px; padding: 20px; }
      .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed rgba(0,255,204,0.1); font-size: 12px; }
      .op-card { background: #070b14; border: 1px solid rgba(255,255,255,0.03); border-left: 4px solid #4b5563; border-radius: 8px; padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .op-card.prio-High { border-left-color: #f87171; }
      .op-card.prio-Medium { border-left-color: #fbbf24; }
      .op-card.prio-Low { border-left-color: #34d399; }
      .hud-checkbox { width: 18px; height: 18px; border: 2px solid #374151; border-radius: 4px; cursor: pointer; }
      .hud-checkbox.checked { background: #00ffcc; }
    `;

    function App() {
      const [view, setView] = React.useState('LANDING');
      const [isSignUp, setIsSignUp] = React.useState(false);
      const [authError, setAuthError] = React.useState('');
      const [currentUser, setCurrentUser] = React.useState(null);
      const [dashTab, setDashTab] = React.useState('METRICS');

      const [username, setUsername] = React.useState('');
      const [password, setPassword] = React.useState('');

      const [tasks, setTasks] = React.useState(() => {
        const data = localStorage.getItem('tactical_ops_matrix');
        return data ? JSON.parse(data) : [
          { id: 'op-1', title: 'Optimize Cloud Server Pipeline Sync', description: 'Address latency bottleneck inside remote deployment actions array.', dueDate: '2026-06-05', priority: 'High', status: 'PENDING' },
          { id: 'op-2', title: 'Refactor Top-Tier Component Hierarchy', description: 'Implement unified state routing pattern for Landing and Authentication gates.', dueDate: '2026-06-10', priority: 'Medium', status: 'COMPLETED' }
        ];
      });

      React.useEffect(() => {
        localStorage.setItem('tactical_ops_matrix', JSON.stringify(tasks));
      }, [tasks]);

      const completedTasks = tasks.filter(t => t.status === 'COMPLETED');
      const pendingTasks = tasks.filter(t => t.status === 'PENDING');
      const progressPercentage = tasks.length > 0 ? Math.round((completedTasks.length / tasks.length) * 100) : 0;

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        setAuthError('');

        if (!username.trim() || !password.trim()) {
          setAuthError('SYSTEM_ERROR: Input fields cannot verify empty array values.');
          return;
        }

        if (isSignUp) {
          localStorage.setItem('usr_sec_' + username, password);
          setCurrentUser(username);
          setView('DASHBOARD');
        } else {
          const record = localStorage.getItem('usr_sec_' + username);
          if ((username === 'dev_core' && password === 'admin') || record === password) {
            setCurrentUser(username === 'dev_core' ? 'DEVELOPER_NODE_01' : username);
            setView('DASHBOARD');
          } else {
            setAuthError('SECURITY_BREACH: Invalid validation key mismatch pattern.');
          }
        }
      };

      return (
        <React.Fragment>
          <style>{globalStyles}</style>

          {view === 'LANDING' && (
            <div className="landing-wrapper">
              <nav className="landing-nav">
                <div className="brand-logo">// CORE_STREAM_TRACKER</div>
                <button className="hud-btn" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>[ SYSTEM_ACCESS ]</button>
              </nav>
              <header className="hero-section">
                <div className="hero-tag">// ENTERPRISE LOGISTICS PIPELINE</div>
                <h1 className="hero-title">High-Throughput Task Optimization Architecture</h1>
                <p className="hero-desc">Streamline developer state machines, audit dynamic workflow constraints, and manage real-time structural pipelines inside a highly optimized dashboard layer.</p>
                <div style={{ display: 'flex', gap: '16px', justifyContent: 'center' }}>
                  <button className="hud-btn btn-primary" onClick={() => { setIsSignUp(true); setView('AUTH'); }}>Initialize Free Node</button>
                  <button className="hud-btn" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>Authenticate Credentials</button>
                </div>
              </header>
              <section className="landing-grid">
                <div className="feature-card"><h3>[01] Telemetry Pipelines</h3><p className="feature-desc">Visualize exact operational completion weights with state-driven graphical progress arrays instantly.</p></div>
                <div className="feature-card"><h3>[02] Granular Criticality</h3><p className="feature-desc">Isolate pipeline congestion issues with prioritized high, medium, and low security validation targets.</p></div>
                <div className="feature-card"><h3>[03] Local Architecture</h3><p className="feature-desc">Maintains data storage integrity using local sandboxed file arrays with zero cloud synchronization vulnerabilities.</p></div>
              </section>
            </div>
          )}

          {view === 'AUTH' && (
            <div className="auth-wrapper">
              <div className="auth-card">
                <div style={{ fontSize: '14px', fontWeight: 700, color: '#fff', marginBottom: '8px' }}>{isSignUp ? 'REGISTER_NEW_NODE' : 'ESTABLISH_SECURE_SESSION'}</div>
                {authError && <div className="alert-banner">{authError}</div>}
                <form onSubmit={handleAuthSubmit}>
                  <div style={{ marginBottom: '16px' }}><label style={{ fontSize: '10px', color: '#94a3b8' }}>NODE ACCESS IDENTITY</label><input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="hud-input" /></div>
                  <div style={{ marginBottom: '24px' }}><label style={{ fontSize: '10px', color: '#94a3b8' }}>SECURITY AUTHPASS PHRASE</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="hud-input" /></div>
                  <button type="submit" className="hud-btn btn-primary" style={{ width: '100%' }}>{isSignUp ? 'GENERATE THREAD ASSETS' : 'DECRYPT SYSTEM DATA'}</button>
                </form>
                <div style={{ marginTop: '24px', textAlign: 'center' }}><button className="btn-text" onClick={() => { setIsSignUp(!isSignUp); setAuthError(''); }}>{isSignUp ? 'Have an existing node? Log in' : 'Need new configuration? Register'}</button></div>
              </div>
            </div>
          )}

          {view === 'DASHBOARD' && (
            <div className="dashboard-container">
              <aside className="nav-drawer">
                <div>
                  <div style={{ color: '#fff', paddingBottom: '16px' }}>// CORE_SYS_v2.0</div>
                  <div className="drawer-menu">
                    <div className={`drawer-item ${dashTab === 'METRICS' ? 'active' : ''}`} onClick={() => setDashTab('METRICS')}>ACTIVE_OPERATIONS</div>
                    <div className={`drawer-item ${dashTab === 'ACCOMPLISHMENTS' ? 'active' : ''}`} onClick={() => setDashTab('ACCOMPLISHMENTS')}>ACCOMPLISHMENTS ({completedTasks.length})</div>
                  </div>
                </div>
                <button className="hud-btn" onClick={() => setView('LANDING')}>DISCONNECT</button>
              </aside>
              <main className="main-content">
                <header className="hud-header">
                  <div style={{ color: '#fff' }}>SYSTEM_STREAM_MONITOR // {dashTab === 'METRICS' ? 'CORE_METRICS' : 'VAULT'}</div>
                  <div style={{ width: '200px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px' }}><span>RESOLVED:</span><span>{progressPercentage}%</span></div>
                    <div className="progress-bar-container"><div className="progress-bar-fill" style={{ width: progressPercentage + '%' }}></div></div>
                  </div>
                </header>

                {dashTab === 'METRICS' ? (
                  <div className="dashboard-grid">
                    <section className="panel-box">
                      <div className="stat-row"><span>TOTAL NODES:</span><span>{tasks.length}</span></div>
                      <div className="stat-row"><span>PENDING:</span><span>{pendingTasks.length}</span></div>
                      <div className="stat-row"><span>COMPLETED:</span><span>{completedTasks.length}</span></div>
                    </section>
                    <section>
                      {pendingTasks.map(task => (
                        <div key={task.id} className="op-card">
                          <div style={{ display: 'flex', gap: '16px' }}>
                            <div className="hud-checkbox" onClick={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'COMPLETED' } : t))}></div>
                            <div>{task.title}</div>
                          </div>
                        </div>
                      ))}
                    </section>
                  </div>
                ) : (
                  <div className="panel-box">
                    {completedTasks.map(task => (
                      <div key={task.id} className="op-card" style={{ opacity: 0.7 }}>
                        <div style={{ display: 'flex', gap: '16px' }}>
                          <div className="hud-checkbox checked" onClick={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'PENDING' } : t))}></div>
                          <div style={{ textDecoration: 'line-through' }}>{task.title}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </main>
            </div>
          )}
        </React.Fragment>
      );
    }

    const container = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(<App />);
</script>
