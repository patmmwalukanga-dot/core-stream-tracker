<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

      body { 
        margin: 0; 
        background-color: #0b0f19; 
        color: #f3f4f6; 
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Clean Navigation Layout */
      .landing-wrapper {
        min-height: 100vh;
        background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.08), transparent 45vw);
      }
      .landing-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 6%;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(11, 15, 25, 0.7);
        backdrop-filter: blur(12px);
      }
      .brand-logo {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: -0.5px;
        color: #ffffff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand-logo span {
        color: #6366f1;
      }
      .hero-section {
        text-align: center;
        padding: 120px 20px 60px 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .hero-tag {
        display: inline-block;
        background: rgba(99, 102, 241, 0.1);
        color: #818cf8;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 16px;
        border-radius: 9999px;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
      }
      .hero-title {
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -1.5px;
        line-height: 1.15;
        margin: 0 0 24px 0;
        color: #ffffff;
      }
      .hero-desc {
        color: #9ca3af;
        font-size: 18px;
        line-height: 1.6;
        max-width: 600px;
        margin: 0 auto 40px auto;
      }
      .landing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 28px;
        padding: 40px 6%;
        max-width: 1200px;
        margin: 0 auto;
      }
      .feature-card {
        background: #111827;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        padding: 32px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .feature-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      }
      .feature-icon {
        color: #6366f1;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 16px;
        font-family: 'JetBrains Mono', monospace;
      }
      .feature-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 10px 0;
        color: #ffffff;
      }
      .feature-desc {
        color: #9ca3af;
        font-size: 14px;
        line-height: 1.6;
      }

      /* Modern Forms & Interactive Inputs */
      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: radial-gradient(circle at center, rgba(99, 102, 241, 0.05), transparent 400px);
      }
      .auth-card {
        background: #111827;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        width: 100%;
        max-width: 400px;
        padding: 40px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      }

      /* Sleek Buttons */
      .hud-btn { 
        background: #1f2937;
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #ffffff;
        padding: 10px 22px; 
        font-size: 14px; 
        font-weight: 500; 
        cursor: pointer; 
        border-radius: 8px; 
        transition: all 0.2s ease;
      }
      .hud-btn:hover { background: #2d3748; }
      .btn-primary { background: #6366f1; color: #ffffff; border: none; font-weight: 600; }
      .btn-primary:hover { background: #4f46e5; }
      .btn-text { background: transparent; border: none; color: #9ca3af; cursor: pointer; font-size: 14px; }
      .btn-text:hover { color: #ffffff; text-decoration: underline; }
      
      .hud-input, .hud-select, .hud-textarea { 
        width: 100%; 
        padding: 11px 14px; 
        background: #1f2937; 
        border: 1px solid rgba(255, 255, 255, 0.06); 
        border-radius: 8px; 
        color: #ffffff; 
        box-sizing: border-box; 
        margin-top: 6px; 
        font-family: inherit;
        font-size: 14px;
        transition: border-color 0.2s ease;
      }
      .hud-input:focus, .hud-select:focus, .hud-textarea:focus {
        outline: none;
        border-color: #6366f1;
      }
      .hud-textarea { resize: vertical; height: 90px; }

      /* Corporate Dashboard Layout Grid */
      .dashboard-container { display: flex; min-height: 100vh; }
      .nav-drawer {
        width: 260px;
        background: #111827;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 32px 20px;
        box-sizing: border-box;
      }
      .drawer-menu { display: flex; flex-direction: column; gap: 6px; margin-top: 32px; }
      .drawer-item {
        padding: 12px 16px;
        border-radius: 8px;
        cursor: pointer;
        color: #9ca3af;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .drawer-item.active {
        background: rgba(99, 102, 241, 0.1);
        color: #ffffff;
        font-weight: 600;
      }
      .drawer-item:hover:not(.active) {
        background: rgba(255, 255, 255, 0.03);
        color: #ffffff;
      }
      .main-content { flex-grow: 1; padding: 40px; box-sizing: border-box; max-width: 1400px; margin: 0 auto; width: calc(100% - 260px); }
      
      .progress-bar-container { background: rgba(255,255,255,0.06); border-radius: 9999px; height: 8px; width: 100%; margin-top: 10px; overflow: hidden; }
      .progress-bar-fill { background: #10b981; height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

      .alert-banner { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-size: 13px; }
      .hud-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 24px; margin-bottom: 32px; }
      
      .dashboard-grid { display: grid; grid-template-columns: 340px 1fr; gap: 32px; align-items: start; }
      @media (max-width: 900px) {
        .dashboard-grid { grid-template-columns: 1fr; }
      }
      .left-column { display: flex; flex-direction: column; gap: 32px; }
      
      .panel-box { background: #111827; border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
      .panel-title { font-size: 13px; font-weight: 600; color: #ffffff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
      
      .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; color: #9ca3af; }
      .stat-row span:last-child { color: #ffffff; font-weight: 600; }
      
      /* Premium Smooth Task Cards */
      .op-card { 
        background: #111827; 
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px; 
        padding: 20px 24px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 16px; 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        transition: border-color 0.2s ease;
      }
      .op-card:hover {
        border-color: rgba(255, 255, 255, 0.12);
      }
      
      .priority-badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 10px;
        border-radius: 9999px;
        margin-top: 8px;
        font-family: 'JetBrains Mono', monospace;
      }
      .prio-High .priority-badge { background: rgba(239, 68, 68, 0.1); color: #f87171; }
      .prio-Medium .priority-badge { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
      .prio-Low .priority-badge { background: rgba(16, 185, 129, 0.1); color: #34d399; }
      
      .hud-checkbox { 
        width: 20px; 
        height: 20px; 
        border: 2px solid #4b5563; 
        border-radius: 6px; 
        cursor: pointer; 
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s ease;
      }
      .hud-checkbox:hover { border-color: #6366f1; }
      .hud-checkbox.checked { background: #10b981; border-color: #10b981; }
      
      .delete-btn {
        background: transparent;
        border: none;
        color: #9ca3af;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 6px;
      }
      .delete-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.08); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        function App() {
          const [view, setView] = React.useState('LANDING');
          const [isSignUp, setIsSignUp] = React.useState(false);
          const [authError, setAuthError] = React.useState('');
          const [currentUser, setCurrentUser] = React.useState(null);
          const [dashTab, setDashTab] = React.useState('METRICS');

          const [username, setUsername] = React.useState('');
          const [password, setPassword] = React.useState('');

          const [newTitle, setNewTitle] = React.useState('');
          const [newDesc, setNewDesc] = React.useState('');
          const [newPrio, setNewPrio] = React.useState('Medium');

          // Bulletproof initialization block with an explicit try-catch handler to prevent execution halts
          const [tasks, setTasks] = React.useState(() => {
            try {
              const data = localStorage.getItem('student_tasks_matrix');
              if (data) {
                const parsed = JSON.parse(data);
                if (Array.isArray(parsed)) return parsed;
              }
            } catch (e) {
              console.error("Local storage structure reset forced:", e);
            }
            return [
              { id: 't-1', title: 'Prepare Final Project Mockups', description: 'Design layout wireframes using UI tools for submission.', priority: 'High', status: 'PENDING' },
              { id: 't-2', title: 'Set Up Initial React Application', description: 'Configure base project repository and verify live host links.', priority: 'Medium', status: 'PENDING' },
              { id: 't-3', title: 'Review Database Synchronization Logic', description: 'Audit offline storage rules and verify dynamic data components work.', priority: 'Low', status: 'COMPLETED' }
            ];
          });

          React.useEffect(() => {
            try {
              localStorage.setItem('student_tasks_matrix', JSON.stringify(tasks));
            } catch (e) {
              console.error("Saving state error:", e);
            }
          }, [tasks]);

          const completedTasks = tasks.filter(t => t.status === 'COMPLETED');
          const pendingTasks = tasks.filter(t => t.status === 'PENDING');
          const progressPercentage = tasks.length > 0 ? Math.round((completedTasks.length / tasks.length) * 100) : 0;

          const handleAuthSubmit = (e) => {
            e.preventDefault();
            setAuthError('');

            if (!username.trim() || !password.trim()) {
              setAuthError('Please enter both a username and a password.');
              return;
            }

            if (isSignUp) {
              localStorage.setItem('student_usr_' + username, password);
              setCurrentUser(username);
              setView('DASHBOARD');
            } else {
              const record = localStorage.getItem('student_usr_' + username);
              if ((username === 'student_dev' && password === 'admin') || record === password) {
                setCurrentUser(username === 'student_dev' ? 'Student Workspace' : username);
                setView('DASHBOARD');
              } else {
                setAuthError('Authentication failed: Invalid credentials.');
              }
            }
          };

          const handleAddTask = (e) => {
            e.preventDefault();
            if (!newTitle.trim()) return;

            const newTask = {
              id: 't-' + Date.now(),
              title: newTitle,
              description: newDesc,
              priority: newPrio,
              status: 'PENDING'
            };

            setTasks([...tasks, newTask]);
            setNewTitle('');
            setNewDesc('');
            setNewPrio('Medium');
          };

          const handleDeleteTask = (id) => {
            setTasks(tasks.filter(t => t.id !== id));
          };

          return (
            <React.Fragment>
              {view === 'LANDING' && (
                <div className="landing-wrapper">
                  <nav className="landing-nav">
                    <div className="brand-logo">⚡ Task<span>Tracker</span></div>
                    <button className="hud-btn btn-primary" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>Sign In</button>
                  </nav>
                  <header className="hero-section">
                    <div className="hero-tag">Academic Workflow Manager</div>
                    <h1 className="hero-title">Track your academic projects flawlessly</h1>
                    <p style={{ color: '#9ca3af' }} className="hero-desc">Organize assignments, build custom task boards, and review real-time analytics of your completion records inside a beautiful professional workspace.</p>
                    <div style={{ display: 'flex', gap: '14px', justifyContent: 'center' }}>
                      <button className="hud-btn btn-primary" onClick={() => { setIsSignUp(true); setView('AUTH'); }}>Create Account</button>
                      <button className="hud-btn" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>View Dashboard</button>
                    </div>
                  </header>
                  <section className="landing-grid">
                    <div className="feature-card">
                      <div className="feature-icon">01 //</div>
                      <h3 className="feature-title">Telemetry Metrics</h3>
                      <p className="feature-desc">Dynamic state calculation bars chart your productivity ratios instantly as milestones close.</p>
                    </div>
                    <div className="feature-card">
                      <div className="feature-icon">02 //</div>
                      <h3 className="feature-title">Granular Priority</h3>
                      <p className="feature-desc">Categorize active workloads into clear urgency tags to track critical submission pathways.</p>
                    </div>
                    <div className="feature-card">
                      <div className="feature-icon">03 //</div>
                      <h3 className="feature-title">Local Isolation</h3>
                      <p className="feature-desc">Keeps individual student data securely managed directly within local browser sandbox arrays.</p>
                    </div>
                  </section>
                </div>
              )}

              {view === 'AUTH' && (
                <div className="auth-wrapper">
                  <div className="auth-card">
                    <div style={{ fontSize: '18px', fontWeight: 600, color: '#fff', marginBottom: '6px' }}>
                      {isSignUp ? 'Create Workspace' : 'Sign In'}
                    </div>
                    <p style={{ color: '#9ca3af', fontSize: '14px', margin: '0 0 24px 0' }}>Enter your configuration access credentials below.</p>
                    {authError && <div className="alert-banner">{authError}</div>}
                    <form onSubmit={handleAuthSubmit}>
                      <div style={{ marginBottom: '18px' }}>
                        <label style={{ fontSize: '12px', fontWeight: 500, color: '#9ca3af' }}>USERNAME</label>
                        <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="hud-input" placeholder="student_dev" />
                      </div>
                      <div style={{ marginBottom: '24px' }}>
                        <label style={{ fontSize: '12px', fontWeight: 500, color: '#9ca3af' }}>PASSWORD</label>
                        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="hud-input" placeholder="••••••••" />
                      </div>
                      <button type="submit" className="hud-btn btn-primary" style={{ width: '100%', padding: '12px' }}>
                        {isSignUp ? 'Register Account' : 'Authenticate Session'}
                      </button>
                    </form>
                    <div style={{ marginTop: '24px', textAlign: 'center' }}>
                      <button className="btn-text" onClick={() => { setIsSignUp(!isSignUp); setAuthError(''); }}>
                        {isSignUp ? 'Already have an account? Sign In' : 'Need an account? Register'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {view === 'DASHBOARD' && (
                <div className="dashboard-container">
                  <aside className="nav-drawer">
                    <div>
                      <div className="brand-logo" style={{ fontSize: '16px' }}>⚡ Task<span>Tracker</span></div>
                      <div className="drawer-menu">
                        <div className={"drawer-item " + (dashTab === 'METRICS' ? 'active' : '')} onClick={() => setDashTab('METRICS')}>Active Tasks</div>
                        <div className={"drawer-item " + (dashTab === 'ACCOMPLISHMENTS' ? 'active' : '')} onClick={() => setDashTab('ACCOMPLISHMENTS')}>Completed Work</div>
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: '13px', color: '#fff', marginBottom: '14px', paddingLeft: '16px', borderLeft: '2px solid #6366f1' }}>{currentUser}</div>
                      <button className="hud-btn" style={{ width: '100%' }} onClick={() => setView('LANDING')}>Disconnect</button>
                    </div>
                  </aside>
                  
                  <main className="main-content">
                    <header className="hud-header">
                      <div>
                        <h1 style={{ fontSize: '24px', fontWeight: 700, margin: 0, color: '#fff' }}>
                          {dashTab === 'METRICS' ? 'Workspace Dashboard' : 'Archive History'}
                        </h1>
                        <p style={{ color: '#9ca3af', fontSize: '14px', margin: '4px 0 0 0' }}>Review, configure, and monitor ongoing academic assignments.</p>
                      </div>
                      <div style={{ width: '240px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', fontWeight: 500 }}>
                          <span style={{ color: '#9ca3af' }}>Total Progress</span>
                          <span style={{ color: '#10b981', fontWeight: 600 }}>{progressPercentage}%</span>
                        </div>
                        <div className="progress-bar-container">
                          <div className="progress-bar-fill" style={{ width: progressPercentage + '%' }}></div>
                        </div>
                      </div>
                    </header>

                    {dashTab === 'METRICS' ? (
                      <div className="dashboard-grid">
                        <div className="left-column">
                          <section className="panel-box">
                            <div className="panel-title">Task Metrics</div>
                            <div className="stat-row"><span>Total Tasks</span><span>{tasks.length}</span></div>
                            <div className="stat-row"><span>Pending</span><span style={{ color: '#fbbf24' }}>{pendingTasks.length}</span></div>
                            <div className="stat-row"><span>Completed</span><span style={{ color: '#10b981' }}>{completedTasks.length}</span></div>
                          </section>

                          <section className="panel-box">
                            <div className="panel-title">Create New Task</div>
                            <form onSubmit={handleAddTask} style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                              <div>
                                <label style={{ fontSize: '11px', fontWeight: 600, color: '#9ca3af' }}>TASK TITLE</label>
                                <input type="text" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} className="hud-input" placeholder="e.g., Study for Optics Exam" required />
                              </div>
                              <div>
                                <label style={{ fontSize: '11px', fontWeight: 600, color: '#9ca3af' }}>DESCRIPTION</label>
                                <textarea value={newDesc} onChange={(e) => setNewDesc(e.target.value)} className="hud-textarea" placeholder="Brief details about deadlines or materials..."></textarea>
                              </div>
                              <div>
                                <label style={{ fontSize: '11px', fontWeight: 600, color: '#9ca3af' }}>PRIORITY LEVEL</label>
                                <select value={newPrio} onChange={(e) => setNewPrio(e.target.value)} className="hud-select">
                                  <option value="High">High Urgency</option>
                                  <option value="Medium">Medium Urgency</option>
                                  <option value="Low">Low Urgency</option>
                                </select>
                              </div>
                              <button type="submit" className="hud-btn btn-primary" style={{ marginTop: '4px', padding: '12px' }}>Add Task</button>
                            </form>
                          </section>
                        </div>

                        <section>
                          <div style={{ fontSize: '14px', fontWeight: 600, marginBottom: '16px', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Current Running Tasks ({pendingTasks.length})</div>
                          {pendingTasks.length === 0 ? (
                            <div style={{ padding: '64px', textAlign: 'center', background: '#111827', border: '1px dashed rgba(255, 255, 255, 0.06)', borderRadius: '12px', fontSize: '14px', color: '#9ca3af' }}>
                              No active tasks found. Use the configuration form to add one.
                            </div>
                          ) : (
                            pendingTasks.map(task => (
                              <div key={task.id} className={"op-card prio-" + task.priority}>
                                <div style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
                                  <div className="hud-checkbox" onClick={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'COMPLETED' } : t))}></div>
                                  <div>
                                    <div style={{ fontWeight: 600, color: '#ffffff', fontSize: '16px', letterSpacing: '-0.3px' }}>{task.title}</div>
                                    <div style={{ fontSize: '14px', color: '#9ca3af', marginTop: '4px', lineHeight: '1.5' }}>{task.description}</div>
                                    <span className="priority-badge">{task.priority} Priority</span>
                                  </div>
                                </div>
                                <button className="delete-btn" onClick={() => handleDeleteTask(task.id)}>Remove</button>
                              </div>
                            ))
                          )}
                        </section>
                      </div>
                    ) : (
                      <div className="panel-box">
                        <div className="panel-title">Completed Work Archive</div>
                        {completedTasks.length === 0 ? (
                          <div style={{ padding: '64px', textAlign: 'center', color: '#9ca3af', fontSize: '14px' }}>No historic metrics saved in the archive logs.</div>
                        ) : (
                          completedTasks.map(task => (
                            <div key={task.id} className="op-card" style={{ opacity: 0.65 }}>
                              <div style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
                                <div className="hud-checkbox checked" onClick={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'PENDING' } : t))}>
                                  <span style={{ color: '#ffffff', fontSize: '11px', fontWeight: 700 }}>✓</span>
                                </div>
                                <div>
                                  <div style={{ textDecoration: 'line-through', color: '#9ca3af', fontSize: '16px', fontWeight: 500 }}>{task.title}</div>
                                  <div style={{ fontSize: '14px', color: '#6b7280', marginTop: '2px' }}>{task.description}</div>
                                </div>
                              </div>
                              <button className="delete-btn" onClick={() => handleDeleteTask(task.id)}>Remove</button>
                            </div>
                          ))
                        )}
                      </div>
                    )}
                  </main>
                </div>
              )}
            </React.Fragment>
          );
        }

        const container = document.getElementById('root');
        const reactRoot = ReactDOM.createRoot(container);
        reactRoot.render(<App />);
    </script>
</body>
</html>
