<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Tracker</title>
    
    <!-- Stable Production CDN Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700;800&display=swap');
      
      :root {
        --bg-main: #030712;
        --bg-panel: #090f1e;
        --accent: #00ffcc;
        --accent-dim: rgba(0, 255, 204, 0.15);
        --text-muted: #94a3b8;
        --text-dark: #4b5563;
        --border-glow: rgba(0, 255, 204, 0.2);
      }

      body { 
        margin: 0; 
        background: #030712; 
        color: #00ffcc; 
        font-family: 'JetBrains Mono', monospace;
      }

      /* Landing Page Layer Layout */
      .landing-wrapper {
        font-family: 'Space Grotesk', sans-serif;
        color: #fff;
        min-height: 100vh;
        background: #030712;
      }
      .landing-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 8%;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .brand-logo {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 800;
        color: #00ffcc;
        letter-spacing: 1px;
      }
      .hero-section {
        text-align: center;
        padding: 100px 20px 60px 20px;
        max-width: 900px;
        margin: 0 auto;
      }
      .hero-tag {
        font-family: 'JetBrains Mono', monospace;
        color: #00ffcc;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 16px;
      }
      .hero-title {
        font-size: 56px;
        font-weight: 700;
        line-height: 1.1;
        margin: 0 0 24px 0;
        color: #ffffff;
      }
      .hero-desc {
        color: #94a3b8;
        font-size: 18px;
        max-width: 600px;
        margin: 0 auto 40px auto;
      }
      .landing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        padding: 40px 8%;
        max-width: 1200px;
        margin: 0 auto;
      }
      .feature-card {
        background: #090f1e;
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        padding: 32px;
      }
      .feature-icon {
        color: #00ffcc;
        font-size: 24px;
        margin-bottom: 16px;
      }
      .feature-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 12px 0;
        color: #fff;
      }
      .feature-desc {
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.5;
      }

      /* Gateway Entry Auth Layout */
      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-card {
        background: #090f1e;
        border: 1px solid rgba(0, 255, 204, 0.15);
        border-radius: 12px;
        width: 100%;
        max-width: 420px;
        padding: 40px;
      }

      /* Interface Element Frameworks */
      .hud-btn { 
        background: rgba(0, 255, 204, 0.15); 
        border: 1px solid rgba(0, 255, 204, 0.2); 
        color: #00ffcc; 
        padding: 10px 20px; 
        font-size: 12px; 
        font-weight: 700; 
        cursor: pointer; 
        border-radius: 6px; 
        font-family: 'JetBrains Mono', monospace; 
      }
      .hud-btn:hover { background: #00ffcc; color: #030712; }
      .btn-primary { background: #00ffcc; color: #030712; border: none; font-weight: 800; }
      .btn-text { background: transparent; border: none; color: #94a3b8; cursor: pointer; text-decoration: underline; }
      
      .hud-input, .hud-select, .hud-textarea { 
        width: 100%; 
        padding: 12px; 
        background: #030712; 
        border: 1px solid rgba(0, 255, 204, 0.2); 
        border-radius: 6px; 
        color: #fff; 
        box-sizing: border-box; 
        margin-top: 6px; 
        font-family: 'JetBrains Mono', monospace;
      }
      .hud-textarea { resize: vertical; height: 80px; }

      /* Core Operations Dashboard Interface */
      .dashboard-container { display: flex; min-height: 100vh; }
      .nav-drawer {
        width: 260px;
        background: #090f1e;
        border-right: 1px solid rgba(0, 255, 204, 0.2);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px 16px;
      }
      .drawer-menu { display: flex; flex-direction: column; gap: 8px; margin-top: 40px; }
      .drawer-item {
        padding: 12px 16px;
        border-radius: 6px;
        cursor: pointer;
        color: #94a3b8;
        font-size: 13px;
      }
      .drawer-item.active, .drawer-item:hover {
        background: rgba(0, 255, 204, 0.05);
        color: #00ffcc;
      }
      .main-content { flex-grow: 1; padding: 32px; box-sizing: border-box; }
      
      .progress-bar-container { background: rgba(255,255,255,0.05); border-radius: 4px; height: 6px; width: 100%; margin-top: 8px; }
      .progress-bar-fill { background: #00ffcc; height: 100%; transition: width 0.3s ease; }

      .alert-banner { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #f87171; padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 16px; font-size: 12px; }
      .hud-header { display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0, 255, 204, 0.2); background: #0f172a; padding: 16px 24px; border-radius: 8px; margin-bottom: 24px; }
      
      /* Updated Layout to balanced 2-column view */
      .dashboard-grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
      .left-column { display: flex; flex-direction: column; gap: 24px; }
      
      .panel-box { background: #090f1e; border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 8px; padding: 20px; }
      .panel-title { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 16px; border-bottom: 1px solid rgba(0, 255, 204, 0.1); padding-bottom: 8px; }
      
      .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed rgba(0,255,204,0.1); font-size: 12px; }
      
      .op-card { 
        background: #070b14; 
        border: 1px solid rgba(255,255,255,0.03); 
        border-left: 4px solid #4b5563; 
        border-radius: 8px; 
        padding: 16px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 12px; 
      }
      .op-card.prio-High { border-left-color: #f87171; }
      .op-card.prio-Medium { border-left-color: #fbbf24; }
      .op-card.prio-Low { border-left-color: #34d399; }
      
      .hud-checkbox { 
        width: 18px; 
        height: 18px; 
        border: 2px solid #374151; 
        border-radius: 4px; 
        cursor: pointer; 
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .hud-checkbox.checked { background: #00ffcc; border-color: #00ffcc; }
      
      .delete-btn {
        background: transparent;
        border: none;
        color: #f87171;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
      }
      .delete-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        function App() {
          const [view, setView] = React.useState('LANDING');
          const [isSignUp, setIsSignUp] = React.useState(false);
          const [authError, setAuthError] = React.useState('');
          const [currentUser, setCurrentUser] = React.useState(null);
          const [dashTab, setDashTab] = React.useState('METRICS');

          const [username, setUsername] = React.useState('');
          const [password, setPassword] = React.useState('');

          // Form fields for adding new tasks
          const [newTitle, setNewTitle] = React.useState('');
          const [newDesc, setNewDesc] = React.useState('');
          const [newPrio, setNewPrio] = React.useState('Medium');

          // Populated with realistic Student tasks right out of the box
          const [tasks, setTasks] = React.useState(() => {
            const data = localStorage.getItem('student_tasks_matrix');
            return data ? JSON.parse(data) : [
              { id: 't-1', title: 'Prepare Final Project Mockups', description: 'Design layout wireframes using UI tools for submission.', priority: 'High', status: 'PENDING' },
              { id: 't-2', title: 'Set Up Initial React Application', description: 'Configure base project repository and verify live host links.', priority: 'Medium', status: 'PENDING' },
              { id: 't-3', title: 'Review Database Synchronization Logic', description: 'Audit offline storage rules and verify dynamic data components work.', priority: 'Low', status: 'COMPLETED' }
            ];
          });

          React.useEffect(() => {
            localStorage.setItem('student_tasks_matrix', JSON.stringify(tasks));
          }, [tasks]);

          const completedTasks = tasks.filter(t => t.status === 'COMPLETED');
          const pendingTasks = tasks.filter(t => t.status === 'PENDING');
          const progressPercentage = tasks.length > 0 ? Math.round((completedTasks.length / tasks.length) * 100) : 0;

          const handleAuthSubmit = (e) => {
            e.preventDefault();
            setAuthError('');

            if (!username.trim() || !password.trim()) {
              setAuthError('Error: Please enter both a username and a password.');
              return;
            }

            if (isSignUp) {
              localStorage.setItem('student_usr_' + username, password);
              setCurrentUser(username);
              setView('DASHBOARD');
            } else {
              const record = localStorage.getItem('student_usr_' + username);
              if ((username === 'student_dev' && password === 'admin') || record === password) {
                setCurrentUser(username === 'student_dev' ? 'Student_Operator' : username);
                setView('DASHBOARD');
              } else {
                setAuthError('Access Denied: Invalid username or password combination.');
              }
            }
          };

          // Handle adding new tasks dynamically
          const handleAddTask = (e) => {
            e.preventDefault();
            if (!newTitle.trim()) return;

            const newTask = {
              id: 't-' + Date.now(),
              title: newTitle,
              description: newDesc,
              priority: newPrio,
              status: 'PENDING'
            };

            setTasks([...tasks, newTask]);
            setNewTitle('');
            setNewDesc('');
            setNewPrio('Medium');
          };

          // Handle deleting a task entirely
          const handleDeleteTask = (id) => {
            setTasks(tasks.filter(t => t.id !== id));
          };

          return (
            <React.Fragment>
              {view === 'LANDING' && (
                <div className="landing-wrapper">
                  <nav className="landing-nav">
                    <div className="brand-logo">// TASK_TRACKER</div>
                    <button className="hud-btn" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>[ SIGN IN ]</button>
                  </nav>
                  <header className="hero-section">
                    <div className="hero-tag">// Academic Task Manager</div>
                    <h1 className="hero-title">Track Your Projects and Homework Effortlessly</h1>
                    <p className="hero-desc">Organize your assignments, track your daily progress, and complete milestones using a sleek, responsive interface.</p>
                    <div style={{ display: 'flex', gap: '16px', justifyContent: 'center' }}>
                      <button className="hud-btn btn-primary" onClick={() => { setIsSignUp(true); setView('AUTH'); }}>Create Account</button>
                      <button className="hud-btn" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>Sign In</button>
                    </div>
                  </header>
                  <section className="landing-grid">
                    <div className="feature-card">
                      <div className="feature-icon">01</div>
                      <h3 className="feature-title">Progress Bars</h3>
                      <p className="feature-desc">See your completion percentages rise automatically as you tick off finished items.</p>
                    </div>
                    <div className="feature-card">
                      <div className="feature-icon">02</div>
                      <h3 className="feature-title">Task Importance</h3>
                      <p className="feature-desc">Sort your assignments into high, medium, and low priority indicators instantly.</p>
                    </div>
                    <div className="feature-card">
                      <div className="feature-icon">03</div>
                      <h3 className="feature-title">Local Save</h3>
                      <p className="feature-desc">Your information saves automatically inside your local web browser, completely secure.</p>
                    </div>
                  </section>
                </div>
              )}

              {view === 'AUTH' && (
                <div className="auth-wrapper">
                  <div className="auth-card">
                    <div style={{ fontSize: '14px', fontWeight: 700, color: '#fff', marginBottom: '8px' }}>
                      {isSignUp ? 'CREATE NEW ACCOUNT' : 'SECURE SIGN IN'}
                    </div>
                    {authError && <div className="alert-banner">{authError}</div>}
                    <form onSubmit={handleAuthSubmit}>
                      <div style={{ marginBottom: '16px' }}>
                        <label style={{ fontSize: '10px', color: '#94a3b8' }}>USERNAME</label>
                        <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="hud-input" placeholder="e.g., student_dev" />
                      </div>
                      <div style={{ marginBottom: '24px' }}>
                        <label style={{ fontSize: '10px', color: '#94a3b8' }}>PASSWORD</label>
                        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="hud-input" placeholder="admin" />
                      </div>
                      <button type="submit" className="hud-btn btn-primary" style={{ width: '100%', padding: '12px' }}>
                        {isSignUp ? 'REGISTER' : 'LOG IN'}
                      </button>
                    </form>
                    <div style={{ marginTop: '24px', textAlign: 'center' }}>
                      <button className="btn-text" onClick={() => { setIsSignUp(!isSignUp); setAuthError(''); }}>
                        {isSignUp ? 'Already have an account? Sign In' : 'Need an account? Register'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {view === 'DASHBOARD' && (
                <div className="dashboard-container">
                  <aside className="nav-drawer">
                    <div>
                      <div style={{ color: '#fff', paddingBottom: '16px', fontWeight: 800 }}>// NAV_MENU</div>
                      <div className="drawer-menu">
                        <div className={"drawer-item " + (dashTab === 'METRICS' ? 'active' : '')} onClick={() => setDashTab('METRICS')}>MY TASKS</div>
                        <div className={"drawer-item " + (dashTab === 'ACCOMPLISHMENTS' ? 'active' : '')} onClick={() => setDashTab('ACCOMPLISHMENTS')}>COMPLETED WORK ({completedTasks.length})</div>
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: '11px', color: '#fff', marginBottom: '12px' }}>{currentUser}</div>
                      <button className="hud-btn" style={{ width: '100%' }} onClick={() => setView('LANDING')}>LOG OUT</button>
                    </div>
                  </aside>
                  
                  <main className="main-content">
                    <header className="hud-header">
                      <div style={{ color: '#fff', fontWeight: 700 }}>STUDENT DASHBOARD // {dashTab === 'METRICS' ? 'ACTIVE TASKS' : 'ARCHIVE'}</div>
                      <div style={{ width: '200px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px', marginBottom: '4px' }}>
                          <span>PROGRESS: </span><span>{progressPercentage}%</span>
                        </div>
                        <div className="progress-bar-container">
                          <div className="progress-bar-fill" style={{ width: progressPercentage + '%' }}></div>
                        </div>
                      </div>
                    </header>

                    {dashTab === 'METRICS' ? (
                      <div className="dashboard-grid">
                        
                        {/* LEFT COLUMN: Summary + Interactive Form to fill up the empty space */}
                        <div className="left-column">
                          <section className="panel-box">
                            <div className="panel-title">TASK STATISTICS</div>
                            <div className="stat-row"><span>Total Tasks:</span><span style={{ color: '#fff' }}>{tasks.length}</span></div>
                            <div className="stat-row"><span>Pending:</span><span style={{ color: '#fbbf24' }}>{pendingTasks.length}</span></div>
                            <div className="stat-row"><span>Completed:</span><span style={{ color: '#34d399' }}>{completedTasks.length}</span></div>
                          </section>

                          <section className="panel-box">
                            <div className="panel-title">CREATE NEW TASK</div>
                            <form onSubmit={handleAddTask} style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                              <div>
                                <label style={{ fontSize: '10px', color: '#94a3b8' }}>TASK TITLE</label>
                                <input type="text" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} className="hud-input" placeholder="e.g., Study for Exams" required />
                              </div>
                              <div>
                                <label style={{ fontSize: '10px', color: '#94a3b8' }}>DESCRIPTION</label>
                                <textarea value={newDesc} onChange={(e) => setNewDesc(e.target.value)} className="hud-textarea" placeholder="Briefly describe what needs to be done..."></textarea>
                              </div>
                              <div>
                                <label style={{ fontSize: '10px', color: '#94a3b8' }}>IMPORTANCE LEVEL</label>
                                <select value={newPrio} onChange={(e) => setNewPrio(e.target.value)} className="hud-select">
                                  <option value="High">High Priority</option>
                                  <option value="Medium">Medium Priority</option>
                                  <option value="Low">Low Priority</option>
                                </select>
                              </div>
                              <button type="submit" className="hud-btn btn-primary" style={{ marginTop: '6px' }}>ADD TO TRACKER</button>
                            </form>
                          </section>
                        </div>

                        {/* RIGHT COLUMN: Active list cards */}
                        <section>
                          <div style={{ fontSize: '12px', fontWeight: 700, marginBottom: '16px', color: '#fff' }}>CURRENT RUNNING TASKS</div>
                          {pendingTasks.length === 0 ? (
                            <div style={{ padding: '48px', textAlign: 'center', background: '#090f1e', border: '1px dashed rgba(0,255,204,0.2)', borderRadius: '8px', fontSize: '11px', color: '#4b5563' }}>
                              // No active tasks found. Use the form to add one!
                            </div>
                          ) : (
                            pendingTasks.map(task => (
                              <div key={task.id} className={"op-card prio-" + task.priority}>
                                <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
                                  <div className="hud-checkbox" onClick={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'COMPLETED' } : t))}></div>
                                  <div>
                                    <div style={{ fontWeight: 700, color: '#fff' }}>{task.title}</div>
                                    <div style={{ fontSize: '11px', color: '#94a3b8', marginTop: '4px' }}>{task.description}</div>
                                    <div style={{ fontSize: '9px', color: '#4b5563', marginTop: '4px' }}>Priority: {task.priority}</div>
                                  </div>
                                </div>
                                <button className="delete-btn" onClick={() => handleDeleteTask(task.id)}>Delete</button>
                              </div>
                            ))
                          )}
                        </section>
                      </div>
                    ) : (
                      /* ARCHIVE TAB */
                      <div className="panel-box">
                        <div className="panel-title">COMPLETED MILESTONES ARCHIVE</div>
                        {completedTasks.length === 0 ? (
                          <div style={{ padding: '48px', textAlign: 'center', color: '#4b5563' }}>// No completed work in the log records.</div>
                        ) : (
                          completedTasks.map(task => (
                            <div key={task.id} className="op-card" style={{ opacity: 0.7 }}>
                              <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
                                <div className="hud-checkbox checked" onClick={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'PENDING' } : t))}>
                                  <span style={{ color: '#030712', fontSize: '10px', fontWeight: 900 }}>✓</span>
                                </div>
                                <div>
                                  <div style={{ textDecoration: 'line-through', color: '#94a3b8' }}>{task.title}</div>
                                  <div style={{ fontSize: '11px', color: '#4b5563', marginTop: '2px' }}>{task.description}</div>
                                </div>
                              </div>
                              <button className="delete-btn" onClick={() => handleDeleteTask(task.id)}>Delete</button>
                            </div>
                          ))
                        )}
                      </div>
                    )}
                  </main>
                </div>
              )}
            </React.Fragment>
          );
        }

        const container = document.getElementById('root');
        const reactRoot = ReactDOM.createRoot(container);
        reactRoot.render(<App />);
    </script>
</body>
</html>
