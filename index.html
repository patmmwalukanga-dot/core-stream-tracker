<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Dashboard</title>
    
    <!-- Stable Production CDN Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

      :root {
        --bg-color: #070a12;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        --panel-bg: #0f1626;
        --panel-border: rgba(255, 255, 255, 0.05);
        --panel-shadow: rgba(0, 0, 0, 0.25);
        --nav-drawer-bg: #0d1322;
        --nav-drawer-border: rgba(255, 255, 255, 0.05);
        --overlay-bg: rgba(3, 7, 18, 0.6);
        --metric-card-bg: #131b2e;
        --metric-card-border: rgba(255, 255, 255, 0.04);
        --hud-input-bg: #161f33;
        --hud-input-border: rgba(255, 255, 255, 0.08);
        --hud-input-text: #ffffff;
        --stat-border: rgba(255, 255, 255, 0.03);
        --btn-secondary-bg: #1f2937;
        --btn-secondary-border: rgba(255, 255, 255, 0.06);
        --btn-secondary-text: #ffffff;
        --landing-nav-bg: rgba(11, 15, 25, 0.7);
        --hero-title-color: #ffffff;
        --activity-border: rgba(255, 255, 255, 0.02);
        --activity-text: #e5e7eb;
        --chart-bg: rgba(255, 255, 255, 0.01);
        --radial-gradient-landing: radial-gradient(circle at top right, rgba(99, 102, 241, 0.08), transparent 45vw);
        --radial-gradient-auth: radial-gradient(circle at center, rgba(99, 102, 241, 0.05), transparent 500px);
        
        --badge-high-bg: rgba(239, 68, 68, 0.12);
        --badge-high-text: #f87171;
        --badge-medium-bg: rgba(245, 158, 11, 0.12);
        --badge-medium-text: #fbbf24;
        --badge-low-bg: rgba(16, 185, 129, 0.12);
        --badge-low-text: #34d399;
      }

      [data-theme="light"] {
        --bg-color: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #64748b;
        --panel-bg: #ffffff;
        --panel-border: rgba(99, 102, 241, 0.08);
        --panel-shadow: rgba(99, 102, 241, 0.04);
        --nav-drawer-bg: #ffffff;
        --nav-drawer-border: rgba(99, 102, 241, 0.08);
        --overlay-bg: rgba(15, 23, 42, 0.3);
        --metric-card-bg: #f1f5f9;
        --metric-card-border: rgba(99, 102, 241, 0.05);
        --hud-input-bg: #ffffff;
        --hud-input-border: rgba(99, 102, 241, 0.15);
        --hud-input-text: #0f172a;
        --stat-border: rgba(0, 0, 0, 0.04);
        --btn-secondary-bg: #e2e8f0;
        --btn-secondary-border: rgba(99, 102, 241, 0.1);
        --btn-secondary-text: #0f172a;
        --landing-nav-bg: rgba(255, 255, 255, 0.85);
        --hero-title-color: #0f172a;
        --activity-border: rgba(0, 0, 0, 0.04);
        --activity-text: #1e293b;
        --chart-bg: rgba(99, 102, 241, 0.02);
        --radial-gradient-landing: radial-gradient(circle at top right, rgba(99, 102, 241, 0.12), transparent 45vw);
        --radial-gradient-auth: radial-gradient(circle at center, rgba(99, 102, 241, 0.08), transparent 500px);
        
        --badge-high-bg: rgba(239, 68, 68, 0.08);
        --badge-high-text: #ef4444;
        --badge-medium-bg: rgba(245, 158, 11, 0.08);
        --badge-medium-text: #d97706;
        --badge-low-bg: rgba(16, 185, 129, 0.08);
        --badge-low-text: #10b981;
      }

      body { 
        margin: 0; 
        background-color: var(--bg-color); 
        color: var(--text-primary); 
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      body, .landing-wrapper, .landing-nav, .info-card, .auth-wrapper, .auth-card,
      .nav-drawer, .drawer-overlay, .drawer-item, .main-content, .hud-header,
      .panel-box, .metric-mini-card, .chart-container, .activity-node,
      .menu-trigger-btn, .stat-row, .hud-input, .hud-select, .hud-textarea,
      .filter-chip, .op-card, .delete-btn, .hud-btn {
        transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
      }

      /* Landing Page Layout */
      .landing-wrapper {
        min-height: 100vh;
        background: var(--radial-gradient-landing);
        display: flex;
        flex-direction: column;
      }
      .landing-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 6%;
        border-bottom: 1px solid var(--panel-border);
        background: var(--landing-nav-bg);
        backdrop-filter: blur(12px);
      }
      .hero-section {
        text-align: center;
        padding: 80px 20px 40px 20px;
        max-width: 900px;
        margin: 0 auto;
      }
      .hero-tag {
        display: inline-block;
        background: rgba(99, 102, 241, 0.1);
        color: #818cf8;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 16px;
        border-radius: 9999px;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
      }
      .hero-title {
        font-size: 42px;
        font-weight: 700;
        letter-spacing: -1.5px;
        line-height: 1.2;
        margin: 0 0 20px 0;
        color: var(--hero-title-color);
      }

      /* Information Overview Cards Grid */
      .info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        max-width: 1000px;
        margin: 40px auto 20px auto;
        padding: 0 20px;
      }
      @media (max-width: 768px) {
        .info-grid { grid-template-columns: 1fr; }
      }
      .info-card {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 24px;
        text-align: left;
        box-shadow: 0 4px 20px var(--panel-shadow);
      }
      .info-card:hover {
        transform: translateY(-2px);
        border-color: rgba(99, 102, 241, 0.2);
      }
      .info-icon {
        font-size: 24px;
        margin-bottom: 12px;
      }
      .info-heading {
        font-size: 16px;
        font-weight: 600;
        color: var(--hero-title-color);
        margin: 0 0 8px 0;
      }
      .info-desc {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.5;
        margin: 0;
      }

      /* Authentication Form Card CSS Rules */
      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: var(--radial-gradient-auth);
        box-sizing: border-box;
      }
      .auth-card {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        width: 100%;
        max-width: 480px;
        padding: 36px;
        box-shadow: 0 10px 40px var(--panel-shadow);
        box-sizing: border-box;
      }
      .auth-split-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 480px) {
        .auth-split-row {
          grid-template-columns: 1fr;
          gap: 14px;
        }
      }
      .input-icon-wrapper {
        position: relative;
        margin-top: 6px;
      }
      .input-inline-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
        padding: 4px;
      }
      .input-inline-btn:hover {
        color: #818cf8;
      }
      .auth-utility-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 16px 0 24px 0;
        font-size: 13px;
      }
      .auth-checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
        cursor: pointer;
      }

      /* Dashboard Container Matrix */
      .dashboard-container { 
        display: flex; 
        min-height: 100vh; 
        position: relative;
        background-color: var(--bg-color);
      }

      /* Collapsible Navigation Drawer */
      .nav-drawer {
        width: 280px;
        background: var(--nav-drawer-bg);
        border-right: 1px solid var(--nav-drawer-border);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px;
        box-sizing: border-box;
        position: fixed;
        top: 0; bottom: 0; left: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.25s ease, border-color 0.25s ease;
        box-shadow: 20px 0 30px var(--panel-shadow);
      }
      .nav-drawer.open { transform: translateX(0); }

      .drawer-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: var(--overlay-bg);
        backdrop-filter: blur(4px);
        z-index: 90; display: none;
      }
      .drawer-overlay.visible { display: block; }

      .drawer-menu { display: flex; flex-direction: column; gap: 8px; margin-top: 32px; }
      .drawer-item {
        padding: 12px 16px;
        border-radius: 8px;
        cursor: pointer;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s ease;
      }
      .drawer-item.active {
        background: rgba(99, 102, 241, 0.12);
        color: var(--text-primary);
        font-weight: 600;
        border-left: 3px solid #6366f1;
      }
      .drawer-item:hover:not(.active) {
        background: rgba(99, 102, 241, 0.04);
        color: var(--text-primary);
      }

      /* Main Dynamic Layout Grid Systems */
      .main-content { 
        flex-grow: 1; 
        padding: 32px 40px; 
        box-sizing: border-box; 
        width: 100%;
        max-width: 1650px; 
        margin: 0 auto;
      }
      
      .hud-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-bottom: 1px solid var(--panel-border); 
        padding-bottom: 20px; 
        margin-bottom: 28px; 
        gap: 20px;
      }

      .dashboard-layout-grid { 
        display: grid; 
        grid-template-columns: 320px 1fr 320px; 
        gap: 24px; 
        align-items: start; 
      }
      .archive-layout-grid {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 24px;
        align-items: start;
      }
      @media (max-width: 1400px) {
        .dashboard-layout-grid { grid-template-columns: 320px 1fr; }
        .right-activity-column { grid-column: span 2; }
        .archive-layout-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 1400px) {
        .dashboard-layout-grid { grid-template-columns: 1fr; }
        .right-activity-column { grid-column: span 1; }
      }

      .panel-stack { display: flex; flex-direction: column; gap: 24px; }
      .panel-box { 
        background: var(--panel-bg); 
        border: 1px solid var(--panel-border); 
        border-radius: 12px; 
        padding: 20px; 
        box-shadow: 0 4px 20px var(--panel-shadow); 
      }
      .panel-title { 
        font-size: 11px; font-weight: 700; color: #818cf8; 
        margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px;
        display: flex; justify-content: space-between; align-items: center;
      }

      /* Horizontal Metric Display Blocks */
      .horizontal-metrics-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .metric-mini-card {
        background: var(--metric-card-bg);
        border: 1px solid var(--metric-card-border);
        border-radius: 10px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .metric-mini-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; }
      .metric-mini-val { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

      /* Simulated CSS Chart Elements */
      .chart-container {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        height: 110px;
        padding: 10px 10px 0 10px;
        margin-top: 10px;
        background: var(--chart-bg);
        border-radius: 8px;
      }
      .chart-column-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        gap: 8px;
      }
      .chart-bar-fill {
        width: 24px;
        background: linear-gradient(180deg, #6366f1, #4f46e5);
        border-radius: 4px 4px 0 0;
        transition: height 0.5s ease;
        min-height: 4px;
      }
      .chart-day-label { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

      /* Activity Feed Styling */
      .activity-feed { display: flex; flex-direction: column; gap: 14px; }
      .activity-node {
        display: flex;
        gap: 12px;
        font-size: 12.5px;
        line-height: 1.4;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--activity-border);
      }
      .activity-marker { width: 6px; height: 6px; border-radius: 50%; background: #6366f1; margin-top: 5px; flex-shrink: 0; }
      .activity-time { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

      /* Interface Action Triggers */
      .menu-trigger-btn {
        background: var(--panel-bg); border: 1px solid var(--panel-border); color: var(--text-primary);
        padding: 10px 14px; font-size: 13px; font-weight: 600; border-radius: 8px;
        cursor: pointer; display: flex; align-items: center; gap: 8px;
      }
      .menu-trigger-btn:hover { background: var(--btn-secondary-bg); border-color: #6366f1; }
      .brand-logo { font-weight: 700; font-size: 16px; letter-spacing: -0.5px; color: var(--text-primary); cursor: pointer; }
      .brand-logo span { color: #6366f1; }
      
      .stat-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--stat-border); font-size: 13px; color: var(--text-secondary); }
      .stat-row span:last-child { color: var(--text-primary); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
      
      .hud-input, .hud-select, .hud-textarea { 
        width: 100%; padding: 10px 12px; background: var(--hud-input-bg); border: 1px solid var(--hud-input-border); 
        border-radius: 8px; color: var(--hud-input-text); box-sizing: border-box; margin-top: 5px; font-family: inherit; font-size: 13px;
      }
      .hud-textarea { resize: vertical; height: 75px; }

      .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; }
      .filter-chip {
        background: var(--panel-bg); border: 1px solid var(--panel-border); color: var(--text-secondary);
        padding: 6px 12px; font-size: 11px; font-weight: 500; border-radius: 6px; cursor: pointer;
      }
      .filter-chip.active { background: #6366f1; color: #ffffff; border-color: #6366f1; }

      .op-card { 
        background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px; 
        padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; 
      }
      .priority-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-top: 6px; text-transform: uppercase; }
      .prio-High .priority-badge { background: var(--badge-high-bg); color: var(--badge-high-text); }
      .prio-Medium .priority-badge { background: var(--badge-medium-bg); color: var(--badge-medium-text); }
      .prio-Low .priority-badge { background: var(--badge-low-bg); color: var(--badge-low-text); }
      
      .hud-checkbox { width: 18px; height: 18px; border: 2px solid var(--text-muted); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .hud-checkbox.checked { background: #10b981; border-color: #10b981; }
      .delete-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 6px 10px; }
      .delete-btn:hover { color: #ef4444; }

      .hud-btn { background: var(--btn-secondary-bg); border: 1px solid var(--btn-secondary-border); color: var(--btn-secondary-text); padding: 10px 18px; font-size: 13px; cursor: pointer; border-radius: 8px; }
      .btn-primary { background: #6366f1; color: #ffffff; border: none; font-weight: 600; }
      .btn-primary:hover { background: #4f46e5; }

      .telemetry-timer { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: #34d399; text-align: center; background: var(--hud-input-bg); padding: 10px; border-radius: 8px; border: 1px dashed rgba(52, 211, 153, 0.2); margin-bottom: 12px; }
      .progress-bar-container { background: var(--panel-border); border-radius: 9999px; height: 6px; width: 140px; margin-top: 6px; overflow: hidden; }
      .progress-bar-fill { background: #10b981; height: 100%; transition: width 0.4s ease; }

      .theme-toggle-btn {
        background: var(--btn-secondary-bg);
        border: 1px solid var(--btn-secondary-border);
        color: var(--text-primary);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 18px;
        box-shadow: 0 4px 12px var(--panel-shadow);
      }
      .theme-toggle-btn:hover {
        transform: rotate(15deg) scale(1.05);
        border-color: #6366f1;
        color: #6366f1;
      }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        function App() {
          // Theme state integration
          const [theme, setTheme] = React.useState(() => {
            try {
              const cached = localStorage.getItem('student_theme_mode');
              return cached === 'light' ? 'light' : 'dark';
            } catch (e) {
              return 'dark';
            }
          });

          // Sync theme to document element
          React.useEffect(() => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('student_theme_mode', theme);
          }, [theme]);

          const toggleTheme = () => {
            setTheme(prev => {
              const next = prev === 'dark' ? 'light' : 'dark';
              pushActivity(`Switched workspace style theme to ${next} mode.`);
              return next;
            });
          };

          // High-fidelity SVG components for operating system independent rendering
          const SunIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.5s ease' }}>
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2"/>
              <path d="M12 20v2"/>
              <path d="m4.93 4.93 1.41 1.41"/>
              <path d="m17.66 17.66 1.41 1.41"/>
              <path d="M2 12h2"/>
              <path d="M20 12h2"/>
              <path d="m6.34 17.66-1.41 1.41"/>
              <path d="m19.07 4.93-1.41 1.41"/>
            </svg>
          );

          const MoonIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.5s ease' }}>
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          );

          // Theme Toggle component wrapper
          const renderThemeToggle = () => (
            <button 
              className="theme-toggle-btn" 
              onClick={toggleTheme} 
              title={`Switch to ${theme === 'dark' ? 'Light' : 'Dark'} Mode`}
              aria-label="Toggle Theme"
            >
              {theme === 'dark' ? <SunIcon /> : <MoonIcon />}
            </button>
          );

          // Navigation Tracking states
          const [view, setView] = React.useState('LANDING');
          const [isSignUp, setIsSignUp] = React.useState(false);
          const [authError, setAuthError] = React.useState('');
          const [currentUser, setCurrentUser] = React.useState(null);

          // Advanced Inputs Map ported from older project captures
          const [fullName, setFullName] = React.useState('');
          const [email, setEmail] = React.useState('');
          const [phone, setPhone] = React.useState('');
          const [password, setPassword] = React.useState('');
          const [confirmPassword, setConfirmPassword] = React.useState('');
          const [rememberMe, setRememberMe] = React.useState(false);
          
          // Visibility controls for text masks
          const [showPass, setShowPass] = React.useState(false);
          const [showConfirm, setShowConfirm] = React.useState(false);

          // Main Interactive Layout Controls
          const [drawerOpen, setDrawerOpen] = React.useState(false);
          const [dashTab, setDashTab] = React.useState('ACTIVE_WORKSPACE');
          const [priorityFilter, setPriorityFilter] = React.useState('ALL');
          const [currentTime, setCurrentTime] = React.useState(new Date().toLocaleTimeString());

          // User Entry Form Inputs
          const [newTitle, setNewTitle] = React.useState('');
          const [newDesc, setNewDesc] = React.useState('');
          const [newPrio, setNewPrio] = React.useState('Medium');

          // Pomodoro Timer States
          const [sprintTime, setSprintTime] = React.useState(1500);
          const [sprintActive, setSprintActive] = React.useState(false);

          // Recent Activity Stream Logs Array
          const [activities, setActivities] = React.useState([
            { id: 1, text: 'Task tracking system initialized locally.', logs: '10:12 AM' },
            { id: 2, text: 'Verified offline sync backup configurations.', logs: '09:40 AM' },
            { id: 3, text: 'Customized navigation drawer layout.', logs: 'Yesterday' }
          ]);

          // Browser Sandbox Local Storage Ledger
          const [tasks, setTasks] = React.useState(() => {
            try {
              const data = localStorage.getItem('student_tasks_matrix');
              if (data) {
                const parsed = JSON.parse(data);
                if (Array.isArray(parsed)) return parsed;
              }
            } catch (e) {
              console.error("Local data cache reset:", e);
            }
            return [

                              <div key={task.id} className="op-card" style={{ background: 'rgba(15, 22, 38, 0.2)' }}>
                                <div style={{ display: 'flex', gap: '14px', alignItems: 'center' }}>
                                  <div className="hud-checkbox checked" onClick={() => handleToggleTaskStatus(task.id, task.status)}>
                                    <span style={{ color: '#ffffff', fontSize: '10px', fontWeight: 700 }}>✓</span>
                                  </div>
                                  <div>
                                    <div style={{ textDecoration: 'line-through', color: 'var(--text-muted)', fontSize: '15px' }}>{task.title}</div>
                                    <div style={{ fontSize: '13px', color: 'var(--text-muted)', marginTop: '2px' }}>{task.description}</div>
                                  </div>
                                </div>
                                <button className="delete-btn" onClick={() => handlePurgeTask(task.id)}>Delete</button>
                              </div>
                            ))
                          )}
                        </div>

                        {/* RIGHT HAND PANEL: HISTORICAL TELEMETRY MATRIX & CONTROLS */}
                        <div className="panel-stack">
                          <section className="panel-box">
                            <div className="panel-title">Archive Statistics</div>
                            <div className="stat-row"><span>Lifetime Completed</span><span>{completedTasks.length} Units</span></div>
                            <div className="stat-row"><span>Sync Health</span><span style={{ color: '#34d399' }}>100% Cached</span></div>
                            <div className="stat-row"><span>Storage Overhead</span><span>{JSON.stringify(tasks).length} Bytes</span></div>
                          </section>

                          <section className="panel-box">
                            <div className="panel-title">Maintenance Tools</div>
                            <p style={{ fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.5', margin: '0 0 16px 0' }}>
                              Wipe out completed archive logs permanently. This action cannot be reversed.
                            </p>
                            <button className="hud-btn" style={{ background: 'rgba(239, 68, 68, 0.08)', borderColor: 'rgba(239, 68, 68, 0.2)', color: '#f87171', width: '100%' }} onClick={handleWipeArchive}>
                              Wipe Complete Archive Storage
                            </button>
                          </section>
                        </div>
                      </div>
                    )}
                  </main>
                </div>
              )}
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

    <div id="root"></div>

    <script type="text/babel">
        function App() {
          // Theme state integration
          const [theme, setTheme] = React.useState(() => {
            try {
              const cached = localStorage.getItem('student_theme_mode');
              return cached === 'light' ? 'light' : 'dark';
            } catch (e) {
              return 'dark';
            }
          });

          // Sync theme to document element
          React.useEffect(() => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('student_theme_mode', theme);
          }, [theme]);

          const toggleTheme = () => {
            setTheme(prev => {
              const next = prev === 'dark' ? 'light' : 'dark';
              pushActivity(`Switched workspace style theme to ${next} mode.`);
              return next;
            });
          };

          // High-fidelity SVG components for operating system independent rendering
          const SunIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.5s ease' }}>
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2"/>
              <path d="M12 20v2"/>
              <path d="m4.93 4.93 1.41 1.41"/>
              <path d="m17.66 17.66 1.41 1.41"/>
              <path d="M2 12h2"/>
              <path d="M20 12h2"/>
              <path d="m6.34 17.66-1.41 1.41"/>
              <path d="m19.07 4.93-1.41 1.41"/>
            </svg>
          );

          const MoonIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.5s ease' }}>
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          );

          // Theme Toggle component wrapper
          const renderThemeToggle = () => (
            <button 
              className="theme-toggle-btn" 
              onClick={toggleTheme} 
              title={`Switch to ${theme === 'dark' ? 'Light' : 'Dark'} Mode`}

                            filteredPendingTasks.map(task => (
                              <div key={task.id} className={`op-card prio-${task.priority}`}>
                                <div style={{ display: 'flex', gap: '14px', alignItems: 'flex-start' }}>
                                  <div className="hud-checkbox" style={{ marginTop: '3px' }} onClick={() => handleToggleTaskStatus(task.id, task.status)}></div>
                                  <div>
                                    <div style={{ fontWeight: 600, color: 'var(--text-primary)', fontSize: '15px' }}>{task.title}</div>
                                    <div style={{ fontSize: '13px', color: 'var(--text-secondary)', marginTop: '4px', lineHeight: '1.4' }}>{task.description}</div>
                                    <span className="priority-badge">{task.priority}</span>
                                  </div>
                                </div>
                                <button className="delete-btn" onClick={() => handlePurgeTask(task.id)}>Delete</button>
                              </div>
                            ))
                          )}
                        </div>

                        {/* COLUMN THREE: DYNAMIC INTERACTION ACTIVITY FEED */}
                        <div className="right-activity-column">
                          <section className="panel-box">
                            <div className="panel-title">Recent Activity History</div>
                            <div className="activity-feed">
                              {activities.map(act => (
                                <div key={act.id} className="activity-node">
                                  <div className="activity-marker"></div>
                                  <div>
                                    <div style={{ color: 'var(--activity-text)' }}>{act.text}</div>
                                    <div className="activity-time">{act.logs}</div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </section>
                        </div>

                      </div>
                    ) : (
                      /* BALANCED TWO-COLUMN ARCHIVE LEDGER VIEW */
                      <div className="archive-layout-grid">
                        
                        {/* LEFT HAND PANEL: COMPLETED WORK CARDS CONTAINER */}
                        <div className="panel-box">
                          <div className="panel-title" style={{ marginBottom: '20px' }}>
                            <span>Archived Task Records Storage ({completedTasks.length})</span>
                          </div>
                          
                          {completedTasks.length === 0 ? (
                            <div style={{ padding: '60px 20px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px', border: '1px dashed var(--panel-border)', borderRadius: '8px' }}>
                              No completed tasks saved inside archive memory logs.
                            </div>
                          ) : (
                            completedTasks.map(task => (
                              <div key={task.id} className="op-card" style={{ background: 'rgba(15, 22, 38, 0.2)' }}>
                                <div style={{ display: 'flex', gap: '14px', alignItems: 'center' }}>
                                  <div className="hud-checkbox checked" onClick={() => handleToggleTaskStatus(task.id, task.status)}>
                                    <span style={{ color: '#ffffff', fontSize: '10px', fontWeight: 700 }}>✓</span>
                                  </div>
                                  <div>
                                    <div style={{ textDecoration: 'line-through', color: 'var(--text-muted)', fontSize: '15px' }}>{task.title}</div>
                                    <div style={{ fontSize: '13px', color: 'var(--text-muted)', marginTop: '2px' }}>{task.description}</div>
                                  </div>
                                </div>
                                <button className="delete-btn" onClick={() => handlePurgeTask(task.id)}>Delete</button>
                              </div>
                            ))
                          )}
                        </div>

                        {/* RIGHT HAND PANEL: HISTORICAL TELEMETRY MATRIX & CONTROLS */}
                        <div className="panel-stack">
                          <section className="panel-box">
                            <div className="panel-title">Archive Statistics</div>
                            <div className="stat-row"><span>Lifetime Completed</span><span>{completedTasks.length} Units</span></div>
                            <div className="stat-row"><span>Sync Health</span><span style={{ color: '#34d399' }}>100% Cached</span></div>
                            <div className="stat-row"><span>Storage Overhead</span><span>{JSON.stringify(tasks).length} Bytes</span></div>
                          </section>

                          <section className="panel-box">
                            <div className="panel-title">Maintenance Tools</div>
                            <p style={{ fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.5', margin: '0 0 16px 0' }}>
                              Wipe out completed archive logs permanently. This action cannot be reversed.
                            </p>
                            <button className="hud-btn" style={{ background: 'rgba(239, 68, 68, 0.08)', borderColor: 'rgba(239, 68, 68, 0.2)', color: '#f87171', width: '100%' }} onClick={handleWipeArchive}>
                              Wipe Complete Archive Storage
                            </button>
                          </section>
                        </div>
                      </div>
                    )}
                  </main>
                </div>
              )}
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
