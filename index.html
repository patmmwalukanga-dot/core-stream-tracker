<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Stream Task Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

      body { 
        margin: 0; 
        background-color: #070a12; 
        color: #f3f4f6; 
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Base Layout Matrix */
      .dashboard-container { 
        display: flex; 
        min-height: 100vh; 
        position: relative;
      }

      /* Hidden/Collapsible Compartment Navigation */
      .nav-drawer {
        width: 280px;
        background: #0d1322;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 20px 0 30px rgba(0, 0, 0, 0.5);
      }
      .nav-drawer.open {
        transform: translateX(0);
      }

      /* Blur Overlay when compartment is expanded */
      .drawer-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(3, 7, 18, 0.6);
        backdrop-filter: blur(4px);
        z-index: 90;
        display: none;
      }
      .drawer-overlay.visible {
        display: block;
      }

      .drawer-menu { display: flex; flex-direction: column; gap: 8px; margin-top: 32px; }
      .drawer-item {
        padding: 12px 16px;
        border-radius: 8px;
        cursor: pointer;
        color: #9ca3af;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s ease;
      }
      .drawer-item.active {
        background: rgba(99, 102, 241, 0.12);
        color: #ffffff;
        font-weight: 600;
        border-left: 3px solid #6366f1;
      }
      .drawer-item:hover:not(.active) {
        background: rgba(255, 255, 255, 0.03);
        color: #ffffff;
      }

      /* Main Workspace Layout */
      .main-content { 
        flex-grow: 1; 
        padding: 32px 40px; 
        box-sizing: border-box; 
        width: 100%;
        max-width: 1600px; 
        margin: 0 auto;
        transition: padding 0.3s ease;
      }
      
      /* Top Control Header Layout */
      .hud-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        padding-bottom: 20px; 
        margin-bottom: 28px; 
        gap: 20px;
      }

      .header-controls-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      /* Interactive Menu Button */
      .menu-trigger-btn {
        background: #111827;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #ffffff;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'JetBrains Mono', monospace;
        transition: all 0.2s ease;
      }
      .menu-trigger-btn:hover {
        background: #1f2937;
        border-color: #6366f1;
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.2);
      }

      .brand-logo {
        font-weight: 700;
        font-size: 16px;
        letter-spacing: -0.5px;
        color: #ffffff;
      }
      .brand-logo span { color: #6366f1; }

      /* Telemetry Progress Visualizer */
      .progress-bar-container { background: rgba(255,255,255,0.05); border-radius: 9999px; height: 6px; width: 180px; margin-top: 8px; overflow: hidden; }
      .progress-bar-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; transition: width 0.4s ease; }

      /* Rich Grid Paneling System */
      .dashboard-layout-grid { 
        display: grid; 
        grid-template-columns: 360px 1fr; 
        gap: 28px; 
        align-items: start; 
      }
      @media (max-width: 1100px) {
        .dashboard-layout-grid { grid-template-columns: 1fr; }
      }

      .panel-stack { display: flex; flex-direction: column; gap: 24px; }
      .panel-box { 
        background: #0f1626; 
        border: 1px solid rgba(255, 255, 255, 0.05); 
        border-radius: 12px; 
        padding: 24px; 
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25); 
      }
      .panel-title { 
        font-size: 11px; 
        font-weight: 700; 
        color: #818cf8; 
        margin-bottom: 16px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
        font-family: 'JetBrains Mono', monospace;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Functional Telemetry Metrics Rows */
      .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: #9ca3af; }
      .stat-row span:last-child { color: #ffffff; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
      
      /* Premium Inputs */
      .hud-input, .hud-select, .hud-textarea { 
        width: 100%; 
        padding: 10px 12px; 
        background: #161f33; 
        border: 1px solid rgba(255, 255, 255, 0.08); 
        border-radius: 8px; 
        color: #ffffff; 
        box-sizing: border-box; 
        margin-top: 5px; 
        font-family: inherit;
        font-size: 13px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .hud-input:focus, .hud-select:focus, .hud-textarea:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.15);
      }
      .hud-textarea { resize: vertical; height: 80px; }

      /* Filter Badges Array */
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        overflow-x: auto;
      }
      .filter-chip {
        background: #111827;
        border: 1px solid rgba(255, 255, 255, 0.05);
        color: #9ca3af;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 500;
        border-radius: 6px;
        cursor: pointer;
        font-family: 'JetBrains Mono', monospace;
        transition: all 0.15s ease;
      }
      .filter-chip.active {
        background: #6366f1;
        color: #ffffff;
        border-color: #6366f1;
      }

      /* Task Stream Presentation Cards */
      .op-card { 
        background: #0f1626; 
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px; 
        padding: 18px 20px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 12px; 
        transition: border-color 0.2s ease, transform 0.2s ease;
      }
      .op-card:hover {
        border-color: rgba(99, 102, 241, 0.3);
        transform: translateY(-1px);
      }
      
      .priority-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 4px;
        margin-top: 6px;
        font-family: 'JetBrains Mono', monospace;
        text-transform: uppercase;
      }
      .prio-High .priority-badge { background: rgba(239, 68, 68, 0.12); color: #f87171; }
      .prio-Medium .priority-badge { background: rgba(245, 158, 11, 0.12); color: #fbbf24; }
      .prio-Low .priority-badge { background: rgba(16, 185, 129, 0.12); color: #34d399; }
      
      /* UI Custom Controls */
      .hud-checkbox { 
        width: 18px; height: 18px; 
        border: 2px solid #4b5563; 
        border-radius: 5px; 
        cursor: pointer; 
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: all 0.2s ease;
      }
      .hud-checkbox:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
      .hud-checkbox.checked { background: #10b981; border-color: #10b981; }
      
      .delete-btn {
        background: transparent; border: none; color: #6b7280;
        cursor: pointer; font-family: inherit; font-size: 12px;
        padding: 6px 10px; border-radius: 6px; transition: all 0.2s ease;
      }
      .delete-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.08); }

      .hud-btn { 
        background: #1f2937; border: 1px solid rgba(255, 255, 255, 0.06); color: #ffffff;
        padding: 10px 18px; font-size: 13px; font-weight: 500; cursor: pointer; 
        border-radius: 8px; transition: all 0.2s ease;
      }
      .hud-btn:hover { background: #2d3748; }
      .btn-primary { background: #6366f1; color: #ffffff; border: none; font-weight: 600; }
      .btn-primary:hover { background: #4f46e5; }

      /* Clock & Timer Display System */
      .telemetry-timer {
        font-family: 'JetBrains Mono', monospace;
        font-size: 20px;
        font-weight: 700;
        color: #34d399;
        text-align: center;
        background: #161f33;
        padding: 12px;
        border-radius: 8px;
        border: 1px dashed rgba(52, 211, 153, 0.2);
        margin-bottom: 12px;
      }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        function App() {
          // Dynamic Layout Controllers
          const [drawerOpen, setDrawerOpen] = React.useState(false);
          const [dashTab, setDashTab] = React.useState('ACTIVE_WORKSPACE');
          const [priorityFilter, setPriorityFilter] = React.useState('ALL');
          const [currentTime, setCurrentTime] = React.useState(new Date().toLocaleTimeString());

          // Input Form Management States
          const [newTitle, setNewTitle] = React.useState('');
          const [newDesc, setNewDesc] = React.useState('');
          const [newPrio, setNewPrio] = React.useState('Medium');

          // Sprint Interval Focus Block variables
          const [sprintTime, setSprintTime] = React.useState(1500); // 25-minute study sprint
          const [sprintActive, setSprintActive] = React.useState(false);

          // Fault-tolerant Local Data Sandbox Assembly
          const [tasks, setTasks] = React.useState(() => {
            try {
              const data = localStorage.getItem('student_tasks_matrix');
              if (data) {
                const parsed = JSON.parse(data);
                if (Array.isArray(parsed)) return parsed;
              }
            } catch (e) {
              console.error("Local operational ledger reset execution required:", e);
            }
            return [
              { id: 't-1', title: 'Review Fiber Optics Architecture & Path Loss Calculations', description: 'Study single-mode link budget constraints and signal attenuation formulas for upcoming examinations.', priority: 'High', status: 'PENDING' },
              { id: 't-2', title: 'Audit Campus Marketplace Offline Database Sync Rules', description: 'Optimize SQLite transactional queries inside the application controller to synchronize fluidly with local XAMPP/MySQL backend clusters.', priority: 'High', status: 'PENDING' },
              { id: 't-3', title: 'Refactor Flutter Mobile Interface Layout Structures', description: 'Improve presentation widget structures to maximize scaling accuracy on fluid native screens.', priority: 'Medium', status: 'PENDING' },
              { id: 't-4', title: 'Master 2D Keyframe In-betweening Mechanics', description: 'Complete daily timed construction sketching principles within target storyboard frames.', priority: 'Low', status: 'COMPLETED' }
            ];
          });

          // State Synchronizer Effect 
          React.useEffect(() => {
            localStorage.setItem('student_tasks_matrix', JSON.stringify(tasks));
          }, [tasks]);

          // Running Clock Effect Array
          React.useEffect(() => {
            const timer = setInterval(() => {
              setCurrentTime(new Date().toLocaleTimeString());
            }, 1000);
            return () => clearInterval(timer);
          }, []);

          // Sprint Block Count Down Handler
          React.useEffect(() => {
            let interval = null;
            if (sprintActive && sprintTime > 0) {
              interval = setInterval(() => {
                setSprintTime(prev => prev - 1);
              }, 1000);
            } else if (sprintTime === 0) {
              setSprintActive(false);
              alert("Sprint session execution complete! Take a step back to rest.");
              setSprintTime(1500);
            }
            return () => clearInterval(interval);
          }, [sprintActive, sprintTime]);

          // Calculations Grid Metrics
          const completedTasks = tasks.filter(t => t.status === 'COMPLETED');
          const pendingTasks = tasks.filter(t => t.status === 'PENDING');
          const filteredPendingTasks = pendingTasks.filter(t => priorityFilter === 'ALL' || t.priority === priorityFilter);
          const completionRatio = tasks.length > 0 ? Math.round((completedTasks.length / tasks.length) * 100) : 0;

          const formatSprintDisplay = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
          };

          const handleAddTaskSubmit = (e) => {
            e.preventDefault();
            if (!newTitle.trim()) return;

            const entry = {
              id: 't-' + Date.now(),
              title: newTitle,
              description: newDesc,
              priority: newPrio,
              status: 'PENDING'
            };

            setTasks([...tasks, entry]);
            setNewTitle('');
            setNewDesc('');
            setNewPrio('Medium');
          };

          const handleToggleTaskStatus = (id, currentStatus) => {
            const adjustedStatus = currentStatus === 'PENDING' ? 'COMPLETED' : 'PENDING';
            setTasks(tasks.map(t => t.id === id ? { ...t, status: adjustedStatus } : t));
          };

          const handlePurgeTask = (id) => {
            setTasks(tasks.filter(t => t.id !== id));
          };

          return (
            <div className="dashboard-container">
              
              {/* Blur Overlay Panel */}
              <div className={`drawer-overlay ${drawerOpen ? 'visible' : ''}`} onClick={() => setDrawerOpen(false)}></div>

              {/* Collapsible Hidden Compartment Sidebar */}
              <aside className={`nav-drawer ${drawerOpen ? 'open' : ''}`}>
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div className="brand-logo">⚡ Task<span>Matrix</span></div>
                    <button className="delete-btn" style={{ fontSize: '18px' }} onClick={() => setDrawerOpen(false)}>×</button>
                  </div>
                  
                  <div className="drawer-menu">
                    <div className={`drawer-item ${dashTab === 'ACTIVE_WORKSPACE' ? 'active' : ''}`} 
                         onClick={() => { setDashTab('ACTIVE_WORKSPACE'); setDrawerOpen(false); }}>
                      ⚙️ Active Operations
                    </div>
                    <div className={`drawer-item ${dashTab === 'ARCHIVE_LEDGER' ? 'active' : ''}`} 
                         onClick={() => { setDashTab('ARCHIVE_LEDGER'); setDrawerOpen(false); }}>
                      📋 Completed Archive History
                    </div>
                  </div>
                </div>

                <div>
                  <div style={{ fontSize: '12px', color: '#818cf8', fontFamily: 'JetBrains Mono, monospace', marginBottom: '8px' }}>CORE_ENV_SECURE</div>
                  <div style={{ fontSize: '14px', color: '#fff', fontWeight: 600, paddingLeft: '12px', borderLeft: '2px solid #6366f1' }}>Student Workspace</div>
                </div>
              </aside>

              {/* Workspace Main Execution Section */}
              <main className="main-content">
                
                {/* Control Top Header */}
                <header className="hud-header">
                  <div className="header-controls-left">
                    <button className="menu-trigger-btn" onClick={() => setDrawerOpen(true)}>
                      ☰ OPEN NAV_MENU
                    </button>
                    <div>
                      <h1 style={{ fontSize: '22px', fontWeight: 700, margin: 0, color: '#fff', letterSpacing: '-0.5px' }}>
                        {dashTab === 'ACTIVE_WORKSPACE' ? 'System Terminal Dashboard' : 'Archived Operational Logs'}
                      </h1>
                    </div>
                  </div>

                  <div style={{ textAlign: 'right' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '180px', fontSize: '12px' }}>
                      <span style={{ color: '#9ca3af' }}>Completion Progress</span>
                      <span style={{ color: '#10b981', fontWeight: 700, fontFamily: 'JetBrains Mono' }}>{completionRatio}%</span>
                    </div>
                    <div className="progress-bar-container">
                      <div className="progress-bar-fill" style={{ width: `${completionRatio}%` }}></div>
                    </div>
                  </div>
                </header>

                {dashTab === 'ACTIVE_WORKSPACE' ? (
                  <div className="dashboard-layout-grid">
                    
                    {/* Left Hand Auxiliary Configuration Panels */}
                    <div className="panel-stack">
                      
                      {/* Live System Diagnostics Module */}
                      <section className="panel-box">
                        <div className="panel-title">
                          <span>System Telemetry</span>
                          <span style={{ color: '#34d399' }}>● ONLINE</span>
                        </div>
                        <div className="stat-row"><span>Environment Clock</span><span>{currentTime}</span></div>
                        <div className="stat-row"><span>Active Node Count</span><span>{pendingTasks.length} Units</span></div>
                        <div className="stat-row"><span>Archive Index Size</span><span>{completedTasks.length} Units</span></div>
                        <div className="stat-row"><span>Local Storage Cache</span><span>Secured / Isolated</span></div>
                      </section>

                      {/* Execution Focus Block Module */}
                      <section className="panel-box">
                        <div className="panel-title">Sprint Execution Block</div>
                        <div className="telemetry-timer">{formatSprintDisplay(sprintTime)}</div>
                        <div style={{ display: 'flex', gap: '10px' }}>
                          <button className="hud-btn btn-primary" style={{ flex: 1, padding: '8px' }} onClick={() => setSprintActive(!sprintActive)}>
                            {sprintActive ? 'Halt Session' : 'Initiate Sprint'}
                          </button>
                          <button className="hud-btn" style={{ padding: '8px 12px' }} onClick={() => { setSprintActive(false); setSprintTime(1500); }}>
                            Reset
                          </button>
                        </div>
                      </section>

                      {/* Entry Generation Interface Component */}
                      <section className="panel-box">
                        <div className="panel-title">Initialize Workspace Node</div>
                        <form onSubmit={handleAddTaskSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                          <div>
                            <label style={{ fontSize: '11px', fontWeight: 600, color: '#9ca3af', fontFamily: 'JetBrains Mono' }}>OPERATION TASK TITLE</label>
                            <input type="text" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} className="hud-input" placeholder="e.g., Audit Flutter Controller State" required />
                          </div>
                          <div>
                            <label style={{ fontSize: '11px', fontWeight: 600, color: '#9ca3af', fontFamily: 'JetBrains Mono' }}>OPERATIONAL REASONING / METRICS</label>
                            <textarea value={newDesc} onChange={(e) => setNewDesc(e.target.value)} className="hud-textarea" placeholder="Input execution rules, deadlines, or resource files pathing details..."></textarea>
                          </div>
                          <div>
                            <label style={{ fontSize: '11px', fontWeight: 600, color: '#9ca3af', fontFamily: 'JetBrains Mono' }}>PRIORITY MATRIX CLASSIFICATION</label>
                            <select value={newPrio} onChange={(e) => setNewPrio(e.target.value)} className="hud-select">
                              <option value="High">High Urgency Pathway</option>
                              <option value="Medium">Medium Urgency Pathway</option>
                              <option value="Low">Low Urgency Pathway</option>
                            </select>
                          </div>
                          <button type="submit" className="hud-btn btn-primary" style={{ marginTop: '4px', padding: '10px' }}>Inject Into Workspace</button>
                        </form>
                      </section>
                    </div>

                    {/* Right Hand Operational Pipeline Displays */}
                    <div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                        <div style={{ fontSize: '12px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.5px', fontFamily: 'JetBrains Mono' }}>
                          Current Operational Pipeline ({filteredPendingTasks.length})
                        </div>
                      </div>

                      {/* Advanced Filtering Sub-system */}
                      <div className="filter-bar">
                        {['ALL', 'High', 'Medium', 'Low'].map(prio => (
                          <button key={prio} className={`filter-chip ${priorityFilter === prio ? 'active' : ''}`} onClick={() => setPriorityFilter(prio)}>
                            {prio === 'ALL' ? '// SHOW ALL' : `${prio} Urgency`}
                          </button>
                        ))}
                      </div>

                      {filteredPendingTasks.length === 0 ? (
                        <div style={{ padding: '80px 40px', textAlign: 'center', background: '#0f1626', border: '1px dashed rgba(255, 255, 255, 0.05)', borderRadius: '12px', fontSize: '14px', color: '#6b7280' }}>
                          No ongoing processing arrays verified under the selected filter criteria.
                        </div>
                      ) : (
                        filteredPendingTasks.map(task => (
                          <div key={task.id} className={`op-card prio-${task.priority}`}>
                            <div style={{ display: 'flex', gap: '16px', alignItems: 'flex-start' }}>
                              <div className="hud-checkbox" style={{ marginTop: '3px' }} onClick={() => handleToggleTaskStatus(task.id, task.status)}></div>
                              <div>
                                <div style={{ fontWeight: 600, color: '#ffffff', fontSize: '15px', letterSpacing: '-0.2px' }}>{task.title}</div>
                                <div style={{ fontSize: '13px', color: '#9ca3af', marginTop: '6px', lineHeight: '1.5' }}>{task.description}</div>
                                <span className="priority-badge">{task.priority}</span>
                              </div>
                            </div>
                            <button className="delete-btn" onClick={() => handlePurgeTask(task.id)}>Purge</button>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                ) : (
                  /* Archived Historic Analytics Logs Screen */
                  <div className="panel-box">
                    <div className="panel-title">Historic Operation Record Archive</div>
                    {completedTasks.length === 0 ? (
                      <div style={{ padding: '80px 20px', textAlign: 'center', color: '#6b7280', fontSize: '14px' }}>No entries found saved to the archived telemetry storage database.</div>
                    ) : (
                      completedTasks.map(task => (
                        <div key={task.id} className="op-card" style={{ background: 'rgba(15, 22, 38, 0.5)' }}>
                          <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
                            <div className="hud-checkbox checked" onClick={() => handleToggleTaskStatus(task.id, task.status)}>
                              <span style={{ color: '#ffffff', fontSize: '11px', fontWeight: 700 }}>✓</span>
                            </div>
                            <div>
                              <div style={{ textDecoration: 'line-through', color: '#6b7280', fontSize: '15px', fontWeight: 500 }}>{task.title}</div>
                              <div style={{ fontSize: '13px', color: '#4b5563', marginTop: '4px' }}>{task.description}</div>
                            </div>
                          </div>
                          <button className="delete-btn" onClick={() => handlePurgeTask(task.id)}>Purge</button>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </main>
            </div>
          );
        }

        const container = document.getElementById('root');
        const reactRoot = ReactDOM.createRoot(container);
        reactRoot.render(<App />);
    </script>
</body>
</html>
